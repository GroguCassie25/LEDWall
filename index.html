<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Razel & Christian</title>

    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Siguradong Navy Blue Gradient Background */
            background: #0d1b2a;
            background: radial-gradient(circle at center, #14283c 0%, #0b1522 70%, #050b11 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            position: relative;
        }

        /* 1. LIVE FLOATING PARTICLES (GOLD DUST) */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: #d4af37;
            border-radius: 50%;
            box-shadow: 0 0 8px #d4af37;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        /* Pag-ayos sa bagsak ng particles */
        .particle:nth-child(1) { left: 15%; width: 4px; height: 4px; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 30%; width: 5px; height: 5px; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 50%; width: 3px; height: 3px; animation-duration: 10s; animation-delay: 1s; }
        .particle:nth-child(4) { left: 70%; width: 6px; height: 6px; animation-duration: 18s; animation-delay: 4s; }
        .particle:nth-child(5) { left: 85%; width: 4px; height: 4px; animation-duration: 14s; animation-delay: 3s; }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* 2. ELEGANT GOLD BORDER FRAME */
        .luxury-frame {
            position: absolute;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            pointer-events: none;
            z-index: 2;
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #d4af37;
            z-index: 3;
        }
        .top-left { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .top-right { top: 15px; right: 15px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 15px; left: 15px; border-right: none; border-top: none; }
        .bottom-right { bottom: 15px; right: 15px; border-left: none; border-top: none; }

        /* 3. MAIN CARD CONTAINER */
        .wedding-card {
            text-align: center;
            z-index: 10;
            padding: 40px 30px;
            max-width: 500px;
            width: 85%;
            background: rgba(13, 27, 42, 0.65); /* Bahagyang mas madilim para litaw ang text */
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            
            /* Pinakasimpleng fade-in para siguradong lilitaw agad */
            animation: fadeIn 1.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* TEXT DESIGN (SURE-FIRE SYSTEM FONTS) */
        .sub-title {
            font-family: 'Times New Roman', Times, serif;
            color: #f4f4f4;
            font-size: 13px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Monogram Box */
        .monogram-box {
            position: relative;
            display: inline-block;
            margin: 15px 0;
            width: 150px;
            height: 150px;
        }

        .monogram-circle {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px rgba(212,175,55,0.15);
        }

        .main-initials {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-size: 65px;
            line-height: 150px;
            color: #d4af37;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: normal;
        }

        /* Mga Pangalan */
        .couple-names {
            font-family: 'Times New Roman', Times, serif;
            color: #ffffff;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: normal;
            margin-top: 20px;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: #d4af37;
            margin: 20px auto;
        }

        /* Details */
        .details {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 12px;
            color: #cbd5e1;
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1.8;
        }

        .highlight-date {
            color: #d4af37;
            font-weight: bold;
            font-size: 14px;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .wedding-card { padding: 30px 20px; }
            .main-initials { font-size: 55px; }
            .monogram-box { width: 130px; height: 130px; }
            .couple-names { font-size: 18px; }
            .luxury-frame, .corner { display: none; }
        }
    </style>
</head>
<body>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="luxury-frame"></div>
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <div class="wedding-card">
        <p class="sub-title">The Wedding Celebration of</p>
        
        <div class="monogram-box">
            <div class="monogram-circle"></div>
            <h1 class="main-initials">R&C</h1>
        </div>

        <h2 class="couple-names">Razel & Christian</h2>
        
        <div class="divider"></div>
        
        <p class="details">
            <span class="highlight-date">2026</span><br>
            Lucban, Quezon, Philippines
        </p>
    </div>

</body>
</html>
